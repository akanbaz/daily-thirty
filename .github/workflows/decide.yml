name: Decide

on:
  # Manual only — you run it when you sit down to check (no scheduler).
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-decide
  cancel-in-progress: true

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync + run decision
        env:
          # Optional read-only Trading 212 sync (Settings → Secrets → Actions)
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
          T212_ENV: ${{ secrets.T212_ENV }}
        run: |
          uv sync
          uv run python scripts/github_decide.py

      - name: Job summary
        run: |
          {
            echo "## Daily Thirty"
            echo
            cat DECISION.md
            echo
            echo "### Links"
            echo "- UI: https://akanbaz.github.io/daily-thirty/"
            echo "- DECISION.md: https://github.com/${{ github.repository }}/blob/master/DECISION.md"
          } >> "$GITHUB_STEP_SUMMARY"

      # Deploy Pages from this artifact even if the git commit step fails.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Commit published site + price cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DECISION.md site/index.html site/decision.json cache/*.parquet || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: publish daily decision"
            git pull --rebase origin master
            git push
          fi

  deploy:
    needs: decide
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
